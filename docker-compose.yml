version: '3.8'

services:
  backend:
    build: ./backend
    container_name: suryakiran-backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://neondb_owner:npg_tTdAYX7zh9wp@ep-winter-mountain-aipan2zq-pooler.c-4.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
      - PORT=5000
      - ML_SERVICE_URL=http://ml-service:5001
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - ml-service
    networks:
      - suryakiran-net

  ml-service:
    image: python:3.10-slim
    container_name: suryakiran-ml-service
    working_dir: /app/services/ml
    volumes:
      - ./:/app
    command: sh -c "pip install --no-cache-dir -r requirements.txt && python app.py"
    ports:
      - "5001:5001"
    networks:
      - suryakiran-net

networks:
  suryakiran-net:
    driver: bridge
